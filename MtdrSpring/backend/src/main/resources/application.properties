# ============================================================================
# ORACLE DATABASE CONFIGURATION (ADB - Autonomous Database)
# Credenciales leidas desde variables de entorno — ver .env.example
# ============================================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

## Propiedades de Logging
logging.level.root=info
logging.file.name=logs.log
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

## Spring Security
## SPRING_ADMIN_USER / SPRING_ADMIN_PASSWORD deben definirse como variables de entorno
spring.security.user.name=${SPRING_ADMIN_USER:admin}
spring.security.user.password=${SPRING_ADMIN_PASSWORD}

## Configuracion del Bot de Telegram
## TELEGRAM_BOT_TOKEN debe definirse como variable de entorno
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.name=${TELEGRAM_BOT_NAME:Eq51_bot}
## Activar/desactivar el long-polling del bot (útil cuando dos desarrolladores
## comparten el mismo token — sólo uno puede consumir actualizaciones a la vez).
## Establece TELEGRAM_BOT_ENABLED=false en tu .env para desactivarlo.
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:true}

## Configuracion de Inteligencia Artificial (DeepSeek)
## DEEPSEEK_API_KEY debe definirse como variable de entorno
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

## Configuracion del Orquestador de Agente IA
agent.ai.habilitado=${AGENT_AI_ENABLED:true}
agent.ai.api-key=${DEEPSEEK_API_KEY:}
agent.ai.api-url=https://api.deepseek.com/v1/chat/completions
agent.ai.modelo=${DEEPSEEK_MODEL:deepseek-chat}
